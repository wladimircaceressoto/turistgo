<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuristGo Panel</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <img src="img/logo.png" alt="TuristGo Logo">
                <h2>TuristGo Admin</h2>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="#crear-reserva">Crear Reserva</a></li>
                    <li><a href="#gestionar-reservas">Gestionar Reservas</a></li>
                    <li><a href="#gestionar-servicios">Gestión de Servicios</a></li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <h1>Panel de Reservas - TuristGo</h1>
            
            <section id="crear-reserva" class="seccion-formulario">
                <h2>Crear Reserva</h2>
                <form id="reserva-form">
                    <label for="nombre_cliente">Nombre del Cliente:</label>
                    <input type="text" id="nombre_cliente" name="nombre_cliente" required>
                    
                    <label for="apellido_cliente">Apellido del Cliente:</label>
                    <input type="text" id="apellido_cliente" name="apellido_cliente" required>
                    
                    <label for="telefono_cliente">Teléfono del Cliente:</label>
                    <input type="text" id="telefono_cliente" name="telefono_cliente" required>
                    
                    <label for="fecha_servicio">Fecha del Servicio:</label>
                    <input type="date" id="fecha_servicio" name="fecha_servicio" required>
                    
                    <label for="hora_servicio">Hora del Servicio:</label>
                    <input type="time" id="hora_servicio" name="hora_servicio" required>
                    
                    <label for="aerolinea">Aerolínea:</label>
                    <input type="text" id="aerolinea" name="aerolinea" required>
                    
                    <label for="numero_vuelo">Número de Vuelo:</label>
                    <input type="text" id="numero_vuelo" name="numero_vuelo" required>
                    
                    <label for="cantidad_pasajeros">Cantidad de Pasajeros:</label>
                    <input type="number" id="cantidad_pasajeros" name="cantidad_pasajeros" min="1" max="3" required>
                    
                    <label for="origen">Origen:</label>
                    <input type="text" id="origen" name="origen" required>
                    
                    <label for="destino">Destino:</label>
                    <input type="text" id="destino" name="destino" required>
                    
                    <label for="servicio_id">Servicio:</label>
                    <select id="servicio_id" name="servicio_id" required>
                        <option value="1">Aeropuerto → Hotel</option>
                        <option value="2">Hotel → Aeropuerto</option>
                        <option value="3">City Tour Santiago</option>
                    </select>
                    
                    <label for="observaciones">Observaciones:</label>
                    <textarea id="observaciones" name="observaciones"></textarea>
                    
                    <button type="submit">Crear Reserva</button>
                </form>
            </section>
            
            <section id="gestionar-reservas" class="seccion-tabla">
                <h2>Reservas</h2>
                <table id="tabla-reservas">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Servicio</th>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Origen</th>
                            <th>Destino</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </section>
            
            <section id="gestionar-servicios">
                <h2>Gestión de Servicios</h2>
                <form id="servicio-form" class="seccion-formulario">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required>
                    
                    <label for="descripcion">Descripción:</label>
                    <input type="text" id="descripcion" name="descripcion" required>
                    
                    <label for="precio_base_referencial">Precio base referencial:</label>
                    <input type="number" id="precio_base_referencial" name="precio_base_referencial" min="1" required>
                    
                    <label for="estado">Estado:</label>
                    <select id="estado" name="estado" required>
                        <option value="activo">Activo</option>
                        <option value="inactivo">Inactivo</option>
                    </select>
                    
                    <button type="submit">Crear Servicio</button>
                </form>
                
                <table id="tabla-servicios" class="seccion-tabla">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
