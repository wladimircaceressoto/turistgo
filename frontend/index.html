<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuristGo Panel</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <img src="img/logo.png" alt="TuristGo Logo">
                <h2>TuristGo Admin</h2>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="#crear-reserva">Crear Reserva</a></li>
                    <li><a href="#gestionar-reservas">Gestionar Reservas</a></li>
                    <li><a href="#gestionar-servicios">Gestión de Servicios</a></li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <h1>Panel de Reservas - TuristGo</h1>
            
            <section id="crear-reserva" class="seccion-formulario">
                <h2>Crear Reserva</h2>
                <form id="reserva-form">
                    <label for="nombre_cliente">Nombre del Cliente:</label>
                    <input type="text" id="nombre_cliente" name="nombre_cliente" required>
                    
                    <label for="apellido_cliente">Apellido del Cliente:</label>
                    <input type="text" id="apellido_cliente" name="apellido_cliente" required>
                    
                    <label for="documento_cliente">Documento del Cliente:</label>
                    <input type="text" id="documento_cliente" name="documento_cliente" required>
                    
                    <label for="fecha_servicio">Fecha del Servicio:</label>
                    <input type="date" id="fecha_servicio" name="fecha_servicio" required>
                    
                    <label for="hora_servicio">Hora del Servicio:</label>
                    <input type="time" id="hora_servicio" name="hora_servicio" required>
                    
                    <label for="aerolinea">Aerolínea:</label>
                    <input type="text" id="aerolinea" name="aerolinea" required>
                    
                    <label for="numero_vuelo">Número de Vuelo:</label>
                    <input type="text" id="numero_vuelo" name="numero_vuelo" required>
                    
                    <label for="cantidad_pasajeros">Cantidad de Pasajeros:</label>
                    <input type="number" id="cantidad_pasajeros" name="cantidad_pasajeros" min="1" max="3" required>
                    
                    <label for="observaciones">Observaciones:</label>
                    <textarea id="observaciones" name="observaciones"></textarea>
                    
                    <button type="submit">Crear Reserva</button>
                </form>
            </section>
            
            <section id="gestionar-reservas" class="seccion-tabla">
                <h2>Reservas</h2>
                <table id="tabla-reservas">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </section>
            
            <section id="gestionar-servicios">
                <h2>Gestión de Servicios</h2>
                <p>Módulo de servicios en construcción</p>
            </section>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
